name: Release Assets

# release-please creates the GitHub Release (and tag) when its Release PR is
# merged. This workflow reacts to that published release and attaches the
# build artifacts: cross-platform binaries, the license bundle, and the
# multi-arch container image pushed to GHCR.
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  licenses:
    name: License Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Generate license information
        run: |
          # Generate detailed license information
          cargo license --json > licenses.json

          # Create THIRD-PARTY-LICENSES file
          cat > THIRD-PARTY-LICENSES << 'EOF'
          # Third-Party Licenses

          This file contains the licenses of third-party dependencies used in this project.
          Generated at release time for version ${{ github.event.release.tag_name }}.

          ## Summary of License Types

          EOF

          # Add license summary
          cargo license | grep -E "^[A-Z]" | sort | uniq -c | sort -rn >> THIRD-PARTY-LICENSES

          echo "" >> THIRD-PARTY-LICENSES
          echo "## Detailed License Information" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "To regenerate this list, run:" >> THIRD-PARTY-LICENSES
          echo "\`\`\`bash" >> THIRD-PARTY-LICENSES
          echo "cargo license" >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "## Full Dependency List" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          cargo license >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> THIRD-PARTY-LICENSES

      - name: Package and upload license information
        run: |
          mkdir -p licenses
          mv THIRD-PARTY-LICENSES licenses/
          mv licenses.json licenses/
          tar czf licenses-${{ github.event.release.tag_name }}.tar.gz licenses/
          gh release upload ${{ github.event.release.tag_name }} licenses-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # macOS: build both on the Apple Silicon runner (x86_64 is cross-
          # compiled) to avoid the scarce, soon-to-be-retired Intel runners.
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Windows (native runners: windows-latest is x64, windows-11-arm is ARM64)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: scim-server
          target: ${{ matrix.target }}
          # Ship both backends; sqlx-postgres is pure Rust (rustls) and
          # rusqlite bundles SQLite, so no extra system libraries are needed.
          features: sqlite,postgresql
          tar: unix
          zip: windows
          ref: refs/tags/${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build each architecture natively (no QEMU emulation — emulating a Rust
  # release compile is extremely slow) and push by digest. The merge job then
  # assembles the multi-arch manifest from the per-arch digests.
  docker-build:
    name: Build Docker Image (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEATURES=sqlite,postgresql
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Merge Docker Manifest
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        run: docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
