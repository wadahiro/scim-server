name: Release Assets

# release-please creates the GitHub Release (and tag) when its Release PR is
# merged. This workflow reacts to that published release and attaches the
# build artifacts: cross-platform binaries, the license bundle, and the
# multi-arch container image pushed to GHCR.
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  licenses:
    name: License Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Generate license information
        run: |
          # Generate detailed license information
          cargo license --json > licenses.json

          # Create THIRD-PARTY-LICENSES file
          cat > THIRD-PARTY-LICENSES << 'EOF'
          # Third-Party Licenses

          This file contains the licenses of third-party dependencies used in this project.
          Generated at release time for version ${{ github.event.release.tag_name }}.

          ## Summary of License Types

          EOF

          # Add license summary
          cargo license | grep -E "^[A-Z]" | sort | uniq -c | sort -rn >> THIRD-PARTY-LICENSES

          echo "" >> THIRD-PARTY-LICENSES
          echo "## Detailed License Information" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "To regenerate this list, run:" >> THIRD-PARTY-LICENSES
          echo "\`\`\`bash" >> THIRD-PARTY-LICENSES
          echo "cargo license" >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "## Full Dependency List" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          cargo license >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> THIRD-PARTY-LICENSES

      - name: Package and upload license information
        run: |
          mkdir -p licenses
          mv THIRD-PARTY-LICENSES licenses/
          mv licenses.json licenses/
          tar czf licenses-${{ github.event.release.tag_name }}.tar.gz licenses/
          gh release upload ${{ github.event.release.tag_name }} licenses-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: build with cargo-zigbuild on the stable latest runner and pin
          # the glibc floor to 2.28 (RHEL 8 / Debian 10), so one binary runs on
          # every currently-supported distro and on the distroless runtime —
          # independent of the runner's own glibc. `archive` keeps the asset
          # name free of the glibc suffix.
          - target: x86_64-unknown-linux-gnu.2.28
            rust_target: x86_64-unknown-linux-gnu
            archive: scim-server-x86_64-unknown-linux-gnu
            build_tool: cargo-zigbuild
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu.2.28
            rust_target: aarch64-unknown-linux-gnu
            archive: scim-server-aarch64-unknown-linux-gnu
            build_tool: cargo-zigbuild
            os: ubuntu-latest
          # macOS: both built on the Apple Silicon runner (x86_64 cross-compiled)
          # to avoid the scarce Intel runners.
          - target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            archive: scim-server-aarch64-apple-darwin
            build_tool: cargo
            os: macos-latest
          - target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            archive: scim-server-x86_64-apple-darwin
            build_tool: cargo
            os: macos-latest
          # Windows (native runners: windows-latest is x64, windows-11-arm is ARM64)
          - target: x86_64-pc-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            archive: scim-server-x86_64-pc-windows-msvc
            build_tool: cargo
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            rust_target: aarch64-pc-windows-msvc
            archive: scim-server-aarch64-pc-windows-msvc
            build_tool: cargo
            os: windows-11-arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: scim-server
          target: ${{ matrix.target }}
          build-tool: ${{ matrix.build_tool }}
          archive: ${{ matrix.archive }}
          # Ship both backends; sqlx-postgres is pure Rust (rustls) and
          # rusqlite bundles SQLite, so no extra system libraries are needed.
          features: sqlite,postgresql
          tar: unix
          zip: windows
          ref: refs/tags/${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Package the *exact* published linux binaries into the runtime image
  # (Dockerfile.release just COPYs them, no compilation), so the container and
  # the downloadable release binaries are byte-identical. With no RUN steps the
  # multi-arch image is assembled by COPY alone — no QEMU, built in one job.
  docker:
    name: Build and Push Docker Image
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Stage published linux binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p bin dl/amd64 dl/arm64
          gh release download "$TAG" -D dl \
            -p 'scim-server-x86_64-unknown-linux-gnu.tar.gz' \
            -p 'scim-server-aarch64-unknown-linux-gnu.tar.gz'
          tar xzf dl/scim-server-x86_64-unknown-linux-gnu.tar.gz -C dl/amd64
          tar xzf dl/scim-server-aarch64-unknown-linux-gnu.tar.gz -C dl/arm64
          cp "$(find dl/amd64 -type f -name scim-server | head -1)" bin/scim-server-amd64
          cp "$(find dl/arm64 -type f -name scim-server | head -1)" bin/scim-server-arm64
          chmod +x bin/scim-server-amd64 bin/scim-server-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: prebuilt
          build-args: |
            RUNTIME=gcr.io/distroless/base-nossl-debian13:nonroot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
