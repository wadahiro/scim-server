name: Release Assets

# release-please creates the GitHub Release (and tag) when its Release PR is
# merged. This workflow reacts to that published release and attaches the
# build artifacts: cross-platform binaries, the license bundle, and the
# multi-arch container image pushed to GHCR.
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  licenses:
    name: License Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Generate license information
        run: |
          # Generate detailed license information
          cargo license --json > licenses.json

          # Create THIRD-PARTY-LICENSES file
          cat > THIRD-PARTY-LICENSES << 'EOF'
          # Third-Party Licenses

          This file contains the licenses of third-party dependencies used in this project.
          Generated at release time for version ${{ github.event.release.tag_name }}.

          ## Summary of License Types

          EOF

          # Add license summary
          cargo license | grep -E "^[A-Z]" | sort | uniq -c | sort -rn >> THIRD-PARTY-LICENSES

          echo "" >> THIRD-PARTY-LICENSES
          echo "## Detailed License Information" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "To regenerate this list, run:" >> THIRD-PARTY-LICENSES
          echo "\`\`\`bash" >> THIRD-PARTY-LICENSES
          echo "cargo license" >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "## Full Dependency List" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          cargo license >> THIRD-PARTY-LICENSES
          echo "\`\`\`" >> THIRD-PARTY-LICENSES
          echo "" >> THIRD-PARTY-LICENSES
          echo "Last updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> THIRD-PARTY-LICENSES

      - name: Package and upload license information
        run: |
          mkdir -p licenses
          mv THIRD-PARTY-LICENSES licenses/
          mv licenses.json licenses/
          tar czf licenses-${{ github.event.release.tag_name }}.tar.gz licenses/
          gh release upload ${{ github.event.release.tag_name }} licenses-${{ github.event.release.tag_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    name: Build Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # macOS: build both on the Apple Silicon runner (x86_64 is cross-
          # compiled) to avoid the scarce, soon-to-be-retired Intel runners.
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Windows (native runners: windows-latest is x64, windows-11-arm is ARM64)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: scim-server
          target: ${{ matrix.target }}
          # Ship both backends; sqlx-postgres is pure Rust (rustls) and
          # rusqlite bundles SQLite, so no extra system libraries are needed.
          features: sqlite,postgresql
          tar: unix
          zip: windows
          ref: refs/tags/${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FEATURES=sqlite,postgresql
          cache-from: type=gha
          cache-to: type=gha,mode=max
