name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo. Fork PRs already get a
# read-only token with no secrets, and this makes the same explicit for
# push-to-main runs.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test-basic:
    name: Test Suite (Basic)
    strategy:
      matrix:
        rust: [stable, beta]
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        if: matrix.rust == 'stable'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: matrix.rust == 'stable'
        run: cargo clippy --all-targets --all-features -- -W clippy::all

      - name: Run tests (SQLite only)
        run: cargo test

      - name: Run doc tests
        if: matrix.rust == 'stable'
        run: cargo test --doc

  test-postgres:
    name: Test Suite (PostgreSQL with TestContainers)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Docker
        run: |
          # Ensure Docker daemon is running
          sudo systemctl start docker
          docker --version
          docker info
          
          # Pre-pull PostgreSQL image to speed up tests
          docker pull postgres:15-alpine

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-postgres-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo/git
          key: ubuntu-postgres-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: target
          key: ubuntu-postgres-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests with TestContainers
        run: cargo test --all-features
        env:
          # TestContainers configuration
          TESTCONTAINERS_RYUK_DISABLED: true
          TESTCONTAINERS_COMMAND_TIMEOUT: 180
          RUST_LOG: info
          # Ensure Docker socket access
          DOCKER_HOST: unix:///var/run/docker.sock
        timeout-minutes: 30

      - name: Cleanup Docker containers
        if: always()
        run: |
          # Clean up any remaining containers
          docker ps -aq | xargs -r docker rm -f || true
          docker system prune -f || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Docker
        run: |
          sudo systemctl start docker
          docker pull postgres:15-alpine

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@91534edaf9fd796a162759d80d49cdff574bff2c # cargo-llvm-cov

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          TESTCONTAINERS_COMMAND_TIMEOUT: 180
          RUST_LOG: warn
        timeout-minutes: 20

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          files: lcov.info
          fail_ci_if_error: false  # Don't fail CI if Codecov fails

      - name: Cleanup Docker containers
        if: always()
        run: |
          docker ps -aq | xargs -r docker rm -f || true

  build-check:
    name: Build Check
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (cross-compiled in a container)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # macOS / Windows (native runners, checked with the stock toolchain
          # so platform-specific build breakage surfaces here, not at release)
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # cross supports only Linux targets; macOS/Windows check natively.
      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross

      - name: Check build (Linux via cross)
        if: runner.os == 'Linux'
        run: cross check --target ${{ matrix.target }} --all-features

      - name: Check build (native)
        if: runner.os != 'Linux'
        run: cargo check --target ${{ matrix.target }} --all-features
        shell: bash

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Build (without pushing) so that a broken Dockerfile or dependency
      # change is caught here, not at release time when the tag is already cut.
      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: scim-server:ci
          build-args: |
            FEATURES=sqlite,postgresql
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: docker run --rm scim-server:ci --version

