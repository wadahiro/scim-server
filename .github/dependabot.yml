version: 2

updates:
  # Enable version updates for Cargo
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    reviewers:
      - "wadahiro"
    assignees:
      - "wadahiro"
    # Use the `fix` type so dependency/security updates are recognized by
    # release-please as patch releases. cargo can't split dev/prod prefixes
    # (prefix-development is unsupported for cargo), so dev-dependency bumps
    # also produce a patch release — an accepted trade-off for staying current.
    commit-message:
      prefix: "fix"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    reviewers:
      - "wadahiro"
    assignees:
      - "wadahiro"
    commit-message:
      prefix: "ci"